name: Quality checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production CSS
        run: npm run build

      - name: Verify committed CSS is current
        run: git diff --exit-code -- public/app.css

      - name: Run Worker tests
        run: npm test

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run
